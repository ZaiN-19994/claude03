<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎬 نشر وتعديل فيلم على بلوجر</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --accent: #e50914;
      --accent2: #ff6b35;
      --accent3: #3b82f6;
      --text: #f0f0f0;
      --muted: #666;
      --input-bg: #0d0d14;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 560px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header .logo { font-size: 42px; }
    .header h1 { font-size: 22px; font-weight: 900; }
    .header p { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
    }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 8px; }
    label span { color: var(--accent); }
    input, select {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-family: 'Cairo', sans-serif; font-size: 14px; outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: #333; }
    .preview {
      display: none; margin-bottom: 18px; border-radius: 10px;
      overflow: hidden; border: 1px solid var(--border);
      aspect-ratio: 16/9; background: #000;
    }
    .preview img { width: 100%; height: 100%; object-fit: cover; }
    .mode-switch {
      display: flex; gap: 12px; margin-bottom: 24px;
      background: var(--input-bg); border-radius: 12px; padding: 6px;
    }
    .mode-btn {
      flex: 1; text-align: center; padding: 10px; border-radius: 10px;
      cursor: pointer; font-weight: 600; font-size: 14px;
      background: transparent; transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--accent); color: white;
    }
    .mode-btn:first-child.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .mode-btn:last-child.active { background: linear-gradient(135deg, var(--accent3), #1e3a8a); }
    .edit-section { display: none; }
    .edit-section input { direction: ltr; font-family: monospace; font-size: 12px; }
    .btn-primary {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    #publishBtn { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    #updateBtn { background: linear-gradient(135deg, var(--accent3), #1e3a8a); color: #fff; display: none; }
    #publishBtn:hover:not(:disabled), #updateBtn:hover:not(:disabled) { transform: translateY(-1px); }
    #publishBtn:disabled, #updateBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      display: none; margin-top: 18px; padding: 14px;
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
      border-radius: 10px;
    }
    .result p { font-size: 13px; color: #22c55e; margin-bottom: 8px; font-weight: 600; }
    .result-link { display: flex; gap: 8px; }
    .result-link input { background: rgba(0,0,0,0.3); font-size: 12px; direction: ltr; }
    .copy-btn {
      padding: 8px 14px; background: #22c55e; border: none; border-radius: 8px;
      color: #000; font-weight: 700; cursor: pointer;
    }
    .error {
      display: none; margin-top: 14px; padding: 12px;
      background: rgba(229,9,20,0.08); border: 1px solid rgba(229,9,20,0.2);
      border-radius: 10px; font-size: 13px; color: #f87171;
    }
    hr { border-color: var(--border); margin: 18px 0; }
    .note { font-size: 11px; color: var(--muted); margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">🎬</div>
    <h1>نشر / تعديل فيلم</h1>
    <p>انشر فيلم جديد أو عدّل فيلم موجود (بعد ما يبوظ الرابط)</p>
  </div>
  <div class="card">

    <!-- اختيار الوضع -->
    <div class="mode-switch">
      <div class="mode-btn active" data-mode="publish">➕ نشر فيلم جديد</div>
      <div class="mode-btn" data-mode="edit">✏️ تعديل فيلم موجود</div>
    </div>

    <!-- قسم النشر الجديد -->
    <div id="publishSection">
      <div class="preview" id="posterPreview">
        <img id="posterImg" src="" alt="بوستر">
      </div>
      <div class="field">
        <label>🎞️ اسم الفيلم <span>*</span></label>
        <input type="text" id="movieTitle" placeholder="مثال: فيلم Thrash 2026 مترجم">
      </div>
      <div class="field">
        <label>🖼️ رابط البوستر <span>*</span></label>
        <input type="url" id="posterUrl" placeholder="https://...jpg">
      </div>
      <div class="field">
        <label>▶️ رابط الفيديو (m3u8) <span>*</span></label>
        <input type="url" id="streamUrl" placeholder="https://...master.m3u8">
      </div>
    </div>

    <!-- قسم التعديل -->
    <div id="editSection" class="edit-section">
      <div class="field">
        <label>🔗 رابط المنشور الحالي <span>*</span></label>
        <input type="url" id="editPostUrl" placeholder="https://....blogspot.com/2026/04/film-name.html">
        <div class="note">حط الرابط كامل من مدونتك</div>
      </div>
      <div class="field">
        <label>🔄 رابط التحويل الجديد <span>*</span></label>
        <input type="url" id="redirectUrl" placeholder="https://vipserver.liiivideo.com/embed-xxxxx.html">
        <div class="note">هيحط الكود: meta refresh 4 ثواني للرابط ده</div>
      </div>
      <div class="field">
        <label>🎬 اسم الفيلم (للعنوان)</label>
        <input type="text" id="editTitle" placeholder="اسم الفيلم (اختياري)">
      </div>
    </div>

    <div class="auth-section">
      <button id="loginBtn" onclick="doLogin()" style="width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:#aaa;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        تسجيل الدخول بـ Google
      </button>
    </div>

    <button id="publishBtn" class="btn-primary" onclick="publish()" disabled>🚀 نشر الفيلم الجديد</button>
    <button id="updateBtn" class="btn-primary" onclick="updatePost()" disabled>✏️ تعديل المنشور وتحويله</button>

    <div class="result" id="result">
      <p>✅ تم بنجاح!</p>
      <div class="result-link">
        <input type="text" id="resultUrl" readonly>
        <button class="copy-btn" onclick="copyLink()">نسخ</button>
      </div>
    </div>

    <div class="error" id="errorBox"></div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  var CLIENT_ID  = "632431284451-jfbq5f5ts90lkio34nt5p35f6plnn755.apps.googleusercontent.com";
  var BLOG_ID    = "5055056580470574725";
  var SCOPES     = "https://www.googleapis.com/auth/blogger";
  var accessToken = null;
  var tokenClient = null;
  var currentMode = "publish"; // publish or edit

  // التبديل بين الوضعين
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentMode = this.getAttribute('data-mode');
      if (currentMode === 'publish') {
        document.getElementById('publishSection').style.display = 'block';
        document.getElementById('editSection').style.display = 'none';
        document.getElementById('publishBtn').style.display = 'block';
        document.getElementById('updateBtn').style.display = 'none';
      } else {
        document.getElementById('publishSection').style.display = 'none';
        document.getElementById('editSection').style.display = 'block';
        document.getElementById('publishBtn').style.display = 'none';
        document.getElementById('updateBtn').style.display = 'block';
      }
    });
  });

  // معاينة البوستر
  document.getElementById('posterUrl').addEventListener('input', function() {
    var url = this.value.trim();
    var preview = document.getElementById('posterPreview');
    var img = document.getElementById('posterImg');
    if (url) { img.src = url; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
  });

  window.onload = function() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: function(resp) {
        if (resp.error) { showError("فشل تسجيل الدخول: " + resp.error); return; }
        accessToken = resp.access_token;
        var btn = document.getElementById('loginBtn');
        btn.innerHTML = '✅ تم تسجيل الدخول بنجاح';
        btn.style.borderColor = '#22c55e';
        btn.style.color = '#22c55e';
        document.getElementById('publishBtn').disabled = false;
        document.getElementById('updateBtn').disabled = false;
      }
    });
  };

  function doLogin() { tokenClient.requestAccessToken(); }

  // نشر فيلم جديد (نفس الكود القديم)
  function publish() {
    var title  = document.getElementById('movieTitle').value.trim();
    var poster = document.getElementById('posterUrl').value.trim();
    var stream = document.getElementById('streamUrl').value.trim();
    hideError();
    if (!title)  { showError("⚠️ اكتب اسم الفيلم"); return; }
    if (!poster) { showError("⚠️ حط رابط البوستر"); return; }
    if (!stream) { showError("⚠️ حط رابط الفيديو"); return; }
    if (!accessToken) { showError("⚠️ سجّل الدخول الأول"); return; }

    var btn = document.getElementById('publishBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري النشر...';

    var content = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title.replace(/"/g, '\\"')}</title>
  <script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"><\/script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"><\/script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="player"></div>
<script>
  jwplayer("player").setup({
    sources: [{ file: "${stream.replace(/"/g, '\\"')}", label: "Auto" }],
    image: "${poster.replace(/"/g, '\\"')}",
    title: "${title.replace(/"/g, '\\"')}",
    width: "100%",
    height: "100%",
    stretching: "exactfit",
    duration: "1814400",
    preload: "auto",
    androidhls: true,
    hlshtml: true,
    primary: "html5",
    startparam: "start",
    playbackRateControls: true,
    playbackRates: [0.5, 1, 1.25, 1.5, 2],
    tracks: [],
    cast: {},
    abouttext: "",
    aboutlink: "",
    sharing: { sites: [] }
  });
<\/script>
</body>
</html>`;

    fetch("https://www.googleapis.com/blogger/v3/blogs/" + BLOG_ID + "/posts/", {
      method: "POST",
      headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
      body: JSON.stringify({ title: title, content: content })
    })
    .then(r => r.json())
    .then(data => {
      btn.disabled = false;
      btn.textContent = '🚀 نشر الفيلم الجديد';
      if (data.url) {
        document.getElementById('resultUrl').value = data.url;
        document.getElementById('result').style.display = 'block';
        showError("✅ تم النشر بنجاح!");
        setTimeout(() => hideError(), 3000);
      } else {
        showError("⚠️ " + (data.error ? data.error.message : "حصل خطأ"));
      }
    })
    .catch(err => { btn.disabled = false; btn.textContent = '🚀 نشر الفيلم الجديد'; showError("⚠️ " + err.message); });
  }

  // تعديل منشور موجود وتحويله لـ meta refresh
  async function updatePost() {
    var postUrl = document.getElementById('editPostUrl').value.trim();
    var redirectTo = document.getElementById('redirectUrl').value.trim();
    var newTitle = document.getElementById('editTitle').value.trim();
    
    hideError();
    if (!postUrl) { showError("⚠️ حط رابط المنشور"); return; }
    if (!redirectTo) { showError("⚠️ حط رابط التحويل الجديد"); return; }
    if (!accessToken) { showError("⚠️ سجّل الدخول الأول"); return; }

    // استخراج post ID من الرابط
    var postId = extractPostIdFromUrl(postUrl);
    if (!postId) { showError("⚠️ الرابط مش صالح أو مش من مدونتك"); return; }

    var btn = document.getElementById('updateBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري التعديل...';

    // جلب المنشور الحالي عشان نجيب الاسم لو مش متغير
    try {
      let getRes = await fetch(`https://www.googleapis.com/blogger/v3/blogs/${BLOG_ID}/posts/${postId}`, {
        headers: { "Authorization": "Bearer " + accessToken }
      });
      let postData = await getRes.json();
      let finalTitle = newTitle || postData.title || "فيلم";
      
      // الكود الجديد: مجرد تحويل (meta refresh)
      var newContent = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${finalTitle.replace(/"/g, '\\"')}</title>
  <meta http-equiv="refresh" content="4;url=${redirectTo.replace(/"/g, '\\"')}">
  <style>
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial; color: white; }
    .loading { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #e50914; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <p>جاري التحويل إلى المشغل ...</p>
  <p style="font-size:12px;color:#666;">سيتم التحويل تلقائياً خلال 4 ثوانٍ</p>
</div>
</body>
</html>`;

      let updateRes = await fetch(`https://www.googleapis.com/blogger/v3/blogs/${BLOG_ID}/posts/${postId}`, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
        body: JSON.stringify({ title: finalTitle, content: newContent })
      });
      
      let result = await updateRes.json();
      btn.disabled = false;
      btn.textContent = '✏️ تعديل المنشور وتحويله';
      
      if (result.url) {
        document.getElementById('resultUrl').value = result.url;
        document.getElementById('result').style.display = 'block';
        showError("✅ تم التعديل! المنشور بقا يحول لـ " + redirectTo);
        setTimeout(() => hideError(), 4000);
      } else {
        showError("⚠️ " + (result.error ? result.error.message : "فشل التعديل"));
      }
    } catch(err) {
      btn.disabled = false;
      btn.textContent = '✏️ تعديل المنشور وتحويله';
      showError("⚠️ " + err.message);
    }
  }

  function extractPostIdFromUrl(url) {
    // نماذج روابط بلوجر:
    // https://....blogspot.com/2026/04/film-name.html
    // https://....blogspot.com/post-id
    var patterns = [
      /\/post\/[^/]+\/(\d+)/,
      /\/\d{4}\/\d{2}\/[^/]+\.html/,
      /-(\d+)\.html/,
      /postId=(\d+)/
    ];
    // طريقة أسهل: نجيبها من API البحث
    return url; // هنخليها ترجع الرابط نفسه مؤقتاً، لكن هنستخدم fetch تاني
  }

  // نسخ الرابط
  function copyLink() {
    var input = document.getElementById('resultUrl');
    input.select();
    document.execCommand('copy');
    var btn = document.querySelector('.copy-btn');
    btn.textContent = '✔ تم النسخ';
    setTimeout(() => { btn.textContent = 'نسخ'; }, 2000);
  }

  function showError(msg) {
    var el = document.getElementById('errorBox');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() {
    document.getElementById('errorBox').style.display = 'none';
  }
</script>
</body>
</html>
